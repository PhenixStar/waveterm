<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: deep black, superellipse corners (Hyper-style) -->
  <rect width="512" height="512" rx="112" fill="#0c0c0c"/>
  <rect x="3" y="3" width="506" height="506" rx="110" fill="none" stroke="#1e1035" stroke-width="1.5"/>

  <!-- Stylized T: terminal prompt meets typography -->
  <!-- Top bar (title bar aesthetic) -->
  <rect x="116" y="132" width="280" height="44" rx="6" fill="url(#grad1)"/>
  <rect x="116" y="132" width="280" height="44" rx="6" fill="url(#shimmer)"/>

  <!-- Vertical stem -->
  <rect x="228" y="176" width="56" height="204" rx="6" fill="url(#grad1)"/>
  <rect x="228" y="176" width="56" height="204" rx="6" fill="url(#shimmer)"/>

  <!-- Blinking cursor (purple glow) -->
  <rect x="236" y="388" width="40" height="10" rx="3" fill="#c084fc" filter="url(#glow)"/>

  <!-- Prompt chevron > (Warp-style accent) -->
  <path d="M140 260 L172 288 L140 316" fill="none" stroke="url(#grad2)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Terminal dots (dimmed, top area) -->
  <circle cx="156" cy="100" r="7" fill="#262626"/>
  <circle cx="182" cy="100" r="7" fill="#262626"/>
  <circle cx="208" cy="100" r="7" fill="#262626"/>
</svg>
